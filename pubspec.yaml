name: bustracker
description: "Rastreador de ônibus em tempo real com Google Maps e API SPTrans."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.9.0
  http: ^1.2.2
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
